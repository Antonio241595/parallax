<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax ejercicio Alumnos</title>
    <style>
        body {
            margin: 0;
            background-color: rgb(3, 70, 8);
            color: aliceblue;
        }
 
        #parallax-container {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }
 
        #layer1 {
            position: absolute;
            z-index: 1;
            background-image: url('img/fondo.jpg');
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 100% 100%;  
            background-position: center;
            background-repeat: no-repeat;
        }
 
        #layer2 {
            position: absolute;
            z-index: 2;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        

        #layer2 img {
            width: 100%;
            height: 100%;
            object-fit: fill;  
        }
 
        #layer3 {
            position: absolute;
            z-index: 3;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #layer3 img {
            width: 200px;      
            height: auto;
            position: absolute;
            bottom: 200px;     
            right: 500px;
        }  
 
        #layer4 {
            position: absolute;
            z-index: 4;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #layer4 img {
            width: 100%;
            height: 50%;       
            position: absolute;
            bottom: 0;         
            left: 0;
        }
 
        .completo {
            width: 100%;
            height: auto;
        }
 
        .contenido {
            padding: 50px 20px;
            background-color: rgb(3, 70, 8);
            text-align: center;
            min-height: 500px;
        }
    </style>
</head>
 
<body>
 
    <div id="parallax-container">
 
        <div id="layer1"></div>
            <img src="img/fondo.jpg" alt="Capa !">
 
        <div id="layer2">
            <img src="img/1.png" alt="Capa 2">
        </div>
 
        <div id="layer3">
            <img src="img/2.png" alt="Capa 3">
        </div>
 
        <div id="layer4">
            <img src="img/3.png" alt="Capa 4">
        </div>
 
    </div>
 
    <section class="contenido">
        <h1>Efecto Parallax</h1>
        <p>Desplázate hacia abajo para ver el efecto</p>
    </section>
 
    <script>
        
        document.addEventListener('DOMContentLoaded', function () {
            
            const layer1 = document.getElementById('layer1');
            const layer2 = document.getElementById('layer2');
            const layer3 = document.getElementById('layer3');
            const layer4 = document.getElementById('layer4');
            const container = document.getElementById('parallax-container');
 
            
            const speed1 = 0.4; 
            const speed2 = 0.2;
            const speed3 = 0.1; 
            const speed4 = 0.05; 
 
            function updateParallax() {
                const scrollOffset = container.getBoundingClientRect().top;
 
                layer1.style.transform = `translate3d(0, ${scrollOffset * speed1}px, 0)`;
                layer2.style.transform = `translate3d(0, ${scrollOffset * speed2}px, 0)`;
                layer3.style.transform = `translate3d(0, ${scrollOffset * speed3}px, 0)`;
                layer4.style.transform = `translate3d(0, ${scrollOffset * speed4}px, 0)`;
            }
 
            window.addEventListener('scroll', updateParallax);
            updateParallax();
        });
    </script>
</body>
 
</html>
